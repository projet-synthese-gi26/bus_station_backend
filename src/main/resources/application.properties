spring.application.name=bus_station_backend
server.port=8080

# --- Base de données Réactive (R2DBC + PostgreSQL) ---
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bus_station_db}
spring.r2dbc.username=${DB_USERNAME:root}
spring.r2dbc.password=${DB_PASSWORD:password}
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10

# --- Liquibase (Schema Migration) ---
spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true
spring.liquibase.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bus_station_db}
spring.liquibase.user=${DB_USERNAME:root}
spring.liquibase.password=${DB_PASSWORD:password}

# --- Redis (Cache) ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:7000}
spring.data.redis.password=${REDIS_PASSWORD:password}
spring.data.redis.cluster.enabled=false

# --- Kafka (Messaging) ---
spring.kafka.bootstrap-servers=${KAFKA_HOST:localhost}:${KAFKA_PORT:9092}
spring.kafka.consumer.group-id=bus-station-group

# KAFKA CONSUMER
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# KAFKA PRODUCER
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# CUSTOM CONFIG - EXTERNAL SERVICES
application.external.stock-service-url=http://localhost:8081
application.external.fare-calculator-url=https://fare-calculator-service.pynfi.com

# CUSTOM CONFIG - KAFKA TOPICS
application.kafka.topics.product-events=test-topic
application.kafka.topics.notification-service-create-topic=notification-create-topic
application.kafka.topics.offer-created=offer-created-topic
application.kafka.topics.offer-send=notification-send-topic

# CUSTOM CONFIG - NOTIFICATION REGISTRATION
application.kafka.notification-registration.name=Bus Station
application.kafka.notification-registration.email.host=smtp.gmail.com
application.kafka.notification-registration.email.port=587
application.kafka.notification-registration.email.username=
application.kafka.notification-registration.email.password=

# CUSTOM CONFIG - NOTIFICATION SERVICE
application.kafka.notification-service.token=token-topic
application.kafka.notification-service.template.new-offer-id=1001
application.kafka.notification-service.template.accepted-offer-id=1002

# --- Email (désactivé en local) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- App Custom Props ---
app.email.from-email=local@test.com
app.email.from-name=BusStation
app.email.support-email=local@test.com
app.email.base-url=http://localhost:8080
app.email.logo-url=http://localhost:8080/logo.png

# --- Paiement (clés de test) ---
payment.apiKey=3qUkt_O1YcClmouM6_-W-dZ5bWdx13uf
payment.secretKey=GNqTDwTVmW9WXXFqJSd_IYbISWMy3mrMULxeu3fEz80sVWGGMeb4iZlfNI2quRYH

# --- Media service ---
application.external.media-service-name=busstation
application.external.media-service-url=https://media-service.pynfi.com

# --- Actuator ---
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=always

# --- RESILIENCE4J ---
resilience4j.circuitbreaker.instances.stock-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.stock-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.stock-service.slidingWindowSize=5
resilience4j.circuitbreaker.instances.fare-calculator-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.fare-calculator-service.waitDurationInOpenState=5s
resilience4j.circuitbreaker.instances.fare-calculator-service.slidingWindowSize=5

# --- Swagger ---
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html

# --- Logging ---
logging.level.org.springframework.web=INFO
logging.level.org.springframework.r2dbc=DEBUG
logging.level.cm.yowyob.bus_station_backend=DEBUG