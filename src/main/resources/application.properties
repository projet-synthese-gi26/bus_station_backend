spring.application.name=bus_station_backend
server.port=8080

# --- Base de données Réactive (R2DBC + PostgreSQL) ---
spring.r2dbc.url=r2dbc:postgresql://${DB_HOST:173.212.216.20}:${DB_PORT:5432}/${DB_NAME:station}
spring.r2dbc.username=${DB_USERNAME:app_transaction}
spring.r2dbc.password=${DB_PASSWORD:Yowyob2026#}
spring.r2dbc.pool.initial-size=1
spring.r2dbc.pool.max-size=5
spring.r2dbc.pool.max-acquire-time=30s
spring.r2dbc.pool.max-idle-time=30m
spring.r2dbc.pool.max-life-time=10m
spring.r2dbc.pool.acquire-retry=3
spring.r2dbc.pool.validation-query=SELECT 1

# --- Liquibase (Schema Migration) ---
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.url=jdbc:postgresql://${DB_HOST:173.212.216.20}:${DB_PORT:5432}/${DB_NAME:station}
spring.liquibase.user=${DB_LIQUIBASE_USERNAME:app_liquibase}
spring.liquibase.password=${DB_LIQUIBASE_PASSWORD:Yowyob2026#}
spring.liquibase.enabled=true

spring.sql.init.mode=never

# --- Redis (Cache) ---
spring.data.redis.username=${REDIS_USERNAME}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.cluster.nodes=redis-node-1:6379,redis-node-2:6379,redis-node-3:6379,redis-node-4:6379,redis-node-5:6379,redis-node-6:6379
spring.data.redis.cluster.max-redirects=3
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.lettuce.cluster.refresh.adaptive=true
spring.data.redis.lettuce.cluster.refresh.period=30s
spring.data.redis.lettuce.cluster.refresh.dynamic-refresh-sources=false

# --- Kafka (Messaging) ---
spring.kafka.bootstrap-servers=${KAFKA_HOST}:${KAFKA_PORT:29092}

# ── Authentification SASL/SCRAM-SHA-256 ──────────────────────────
spring.kafka.properties.security.protocol=SASL_PLAINTEXT
spring.kafka.properties.sasl.mechanism=SCRAM-SHA-256
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_BACKEND_USER}" password="${KAFKA_BACKEND_PASSWORD}";
spring.kafka.consumer.group-id=bus-station-group

# KAFKA CONSUMER
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# KAFKA PRODUCER
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# CUSTOM CONFIG - EXTERNAL SERVICES
application.external.stock-service-url=http://localhost:8081
application.external.fare-calculator-url=https://fare-calculator-service.pynfi.com

# CUSTOM CONFIG - KAFKA TOPICS
application.kafka.topics.product-events=test-topic
application.kafka.topics.notification-service-create-topic=notification-create-topic
application.kafka.topics.offer-created=offer-created-topic
application.kafka.topics.offer-send=notification-send-topic

# CUSTOM CONFIG - NOTIFICATION REGISTRATION
application.kafka.notification-registration.name=Bus Station
application.kafka.notification-registration.email.host=smtp.gmail.com
application.kafka.notification-registration.email.port=587
application.kafka.notification-registration.email.username=
application.kafka.notification-registration.email.password=

# CUSTOM CONFIG - NOTIFICATION SERVICE
application.kafka.notification-service.token=token-topic
application.kafka.notification-service.template.new-offer-id=1001
application.kafka.notification-service.template.accepted-offer-id=1002

# --- Email (désactivé en local) ---
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- App Custom Props ---
app.email.from-email=local@test.com
app.email.from-name=BusStation
app.email.support-email=local@test.com
app.email.base-url=http://localhost:8080
app.email.logo-url=http://localhost:8080/logo.png

