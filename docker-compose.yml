version: "3.8"

services:
  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: bus_station_postgres
    environment:
      POSTGRES_DB: bus_station_db
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d bus_station_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis (port 7000 comme attendu par l'app) ─────────────────
  redis:
    image: redis:7-alpine
    container_name: bus_station_redis
    command: redis-server --requirepass password --port 7000
    ports:
      - "7000:7000"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "7000", "-a", "password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Zookeeper (requis par Kafka) ──────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: bus_station_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  # ─── Kafka ─────────────────────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: bus_station_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test:
        [
          "CMD",
          "kafka-broker-api-versions",
          "--bootstrap-server",
          "localhost:9092",
        ]
      interval: 15s
      timeout: 10s
      retries: 5

  # ─── Application Spring Boot ───────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bus_station_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    ports:
      - "8080:8080"
    environment:
      # PostgreSQL
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: bus_station_db
      DB_USERNAME: root
      DB_PASSWORD: password
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 7000
      REDIS_PASSWORD: password
      # Kafka
      KAFKA_HOST: kafka
      KAFKA_PORT: 9092
      # Mail (laisser vide en local, l'app démarrera quand même)
      MAIL_PASSWORD: ""
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
    restart: on-failure

volumes:
  postgres_data:
  redis_data:
